name: 🎬 Provider Health Monitor & Auto-Fix

on:
  # Run every 6 hours
  schedule:
    - cron: '0 */6 * * *'
  
  # Manual trigger
  workflow_dispatch:
    inputs:
      force_fix:
        description: 'Force fix all detected issues'
        required: false
        default: 'false'
        type: boolean
  
  # Run on push to main branch
  push:
    branches: [ main, master ]
    paths: 
      - '**/*.kt'
      - 'check_providers.py'
      - 'fix_domains.py'

env:
  PYTHON_VERSION: '3.11'
  
jobs:
  health-check-and-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    
    steps:
    - name: 🔄 Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 lxml selenium webdriver-manager
        pip install python-dotenv pyyaml
        
    - name: 📊 Run Provider Health Check
      id: health_check
      run: |
        echo "🔍 Running comprehensive provider health check..."
        python check_providers.py > health_report.txt 2>&1
        
        # Extract key metrics
        WORKING_PROVIDERS=$(grep "✅ Fully Working:" health_report.txt | grep -o '[0-9]*' | head -1 || echo "0")
        FAILED_PROVIDERS=$(grep "❌ Failed:" health_report.txt | grep -o '[0-9]*' | head -1 || echo "0")
        WORKING_DOMAINS=$(grep "📊 Working Domains:" health_report.txt | cut -d'/' -f1 | grep -o '[0-9]*$' || echo "0")
        TOTAL_DOMAINS=$(grep "📊 Working Domains:" health_report.txt | cut -d'/' -f2 | cut -d' ' -f1 || echo "0")
        
        echo "working_providers=$WORKING_PROVIDERS" >> $GITHUB_OUTPUT
        echo "failed_providers=$FAILED_PROVIDERS" >> $GITHUB_OUTPUT
        echo "working_domains=$WORKING_DOMAINS" >> $GITHUB_OUTPUT
        echo "total_domains=$TOTAL_DOMAINS" >> $GITHUB_OUTPUT
        
        # Calculate health percentage
        if [ "$TOTAL_DOMAINS" -gt 0 ]; then
          HEALTH_PERCENT=$((($WORKING_DOMAINS * 100) / $TOTAL_DOMAINS))
        else
          HEALTH_PERCENT=0
        fi
        echo "health_percent=$HEALTH_PERCENT" >> $GITHUB_OUTPUT
        
        # Determine if fixes are needed
        NEEDS_FIX="false"
        if [ "$FAILED_PROVIDERS" -gt 0 ] || [ "$HEALTH_PERCENT" -lt 70 ]; then
          NEEDS_FIX="true"
        fi
        echo "needs_fix=$NEEDS_FIX" >> $GITHUB_OUTPUT
        
        echo "📈 Health Check Results:"
        echo "- Working Providers: $WORKING_PROVIDERS"
        echo "- Failed Providers: $FAILED_PROVIDERS" 
        echo "- Working Domains: $WORKING_DOMAINS/$TOTAL_DOMAINS ($HEALTH_PERCENT%)"
        echo "- Needs Fix: $NEEDS_FIX"
    
    - name: 🔧 Auto-Fix Issues
      if: steps.health_check.outputs.needs_fix == 'true' || github.event.inputs.force_fix == 'true'
      id: auto_fix
      run: |
        echo "🛠️ Running automated fixes..."
        python fix_domains.py > fix_report.txt 2>&1
        
        # Check if any files were modified
        CHANGES_MADE=$(git status --porcelain | wc -l)
        echo "changes_made=$CHANGES_MADE" >> $GITHUB_OUTPUT
        
        if [ "$CHANGES_MADE" -gt 0 ]; then
          echo "✅ Fixes applied successfully"
          git config user.name "Provider Health Bot"
          git config user.email "action@github.com"
          git add -A
          git commit -m "🤖 Auto-fix: Update failed domains and providers
          
          - Fixed providers: ${{ steps.health_check.outputs.failed_providers }}
          - Updated domains for better reliability
          - Health improved from ${{ steps.health_check.outputs.health_percent }}%
          
          Auto-generated by Provider Health Monitor"
        else
          echo "ℹ️ No fixes needed or applicable"
        fi
    
    - name: 🔍 Enhanced Provider Analysis
      run: |
        echo "🔬 Running enhanced provider analysis..."
        python3 -c "
        import requests
        import json
        import time
        from datetime import datetime
        
        def test_provider_selectors(provider_name, url):
            '''Test if provider selectors are working'''
            try:
                headers = {
                    'User-Agent': 'Mozilla/5.0 (Ubuntu; Linux x86_64; rv:91.0) Gecko/20100101 Firefox/91.0'
                }
                response = requests.get(url, headers=headers, timeout=10)
                if response.status_code == 200:
                    # Basic content checks
                    content = response.text.lower()
                    has_movies = any(word in content for word in ['movie', 'film', 'cinema', 'video'])
                    has_structure = '<html' in content and '</html>' in content
                    return {
                        'status': 'working',
                        'has_content': has_movies,
                        'has_structure': has_structure,
                        'response_time': response.elapsed.total_seconds()
                    }
            except Exception as e:
                return {'status': 'failed', 'error': str(e)}
        
        # Test key providers
        providers = {
            'HDhub4u': 'https://hdhub4u.build/?utm=mn',
            'MoviesDrive': 'https://moviesdrive.channel/',
            'Movierulzhd': 'https://1movierulzhd.cv/'
        }
        
        results = {}
        for name, url in providers.items():
            print(f'Testing {name}...')
            results[name] = test_provider_selectors(name, url)
            time.sleep(2)  # Be respectful
        
        # Save enhanced analysis
        with open('enhanced_analysis.json', 'w') as f:
            json.dump({
                'timestamp': datetime.now().isoformat(),
                'provider_analysis': results
            }, f, indent=2)
        
        print('Enhanced analysis complete!')
        "
    
    - name: 🧪 Test Video Extraction
      run: |
        echo "🎥 Testing video extraction capabilities..."
        python3 -c "
        import requests
        import re
        import json
        from urllib.parse import urljoin
        
        def test_extractor_patterns():
            '''Test common extractor patterns'''
            patterns = {
                'filemoon': r'(?:filemoon\.(?:to|in|sx))',
                'vidstack': r'(?:vidstack\.io|server1\.uns\.bio)',
                'gofile': r'(?:gofile\.io|api\.gofile\.io)',
                'gdflix': r'(?:new6\.gdflix\.dad)',
                'hubstream': r'(?:hubstream\.art)',
            }
            
            working_patterns = []
            for name, pattern in patterns.items():
                # Test pattern validity
                try:
                    re.compile(pattern)
                    working_patterns.append(name)
                except re.error:
                    print(f'❌ Invalid pattern for {name}: {pattern}')
            
            return working_patterns
        
        working_extractors = test_extractor_patterns()
        print(f'✅ Working extractor patterns: {len(working_extractors)}/5')
        
        with open('extractor_test.json', 'w') as f:
            json.dump({'working_extractors': working_extractors}, f)
        "
    
    - name: 📈 Generate Status Badge
      run: |
        HEALTH_PERCENT=${{ steps.health_check.outputs.health_percent }}
        
        if [ "$HEALTH_PERCENT" -ge 80 ]; then
          BADGE_COLOR="brightgreen"
          STATUS="Excellent"
        elif [ "$HEALTH_PERCENT" -ge 60 ]; then
          BADGE_COLOR="yellow"
          STATUS="Good"
        elif [ "$HEALTH_PERCENT" -ge 40 ]; then
          BADGE_COLOR="orange"
          STATUS="Fair"
        else
          BADGE_COLOR="red"
          STATUS="Poor"
        fi
        
        echo "![Provider Health](https://img.shields.io/badge/Provider%20Health-${HEALTH_PERCENT}%25-${BADGE_COLOR})" > health_badge.md
        echo "![Status](https://img.shields.io/badge/Status-${STATUS}-${BADGE_COLOR})" >> health_badge.md
    
    - name: 📝 Update README with Status
      if: steps.auto_fix.outputs.changes_made > 0 || github.event_name == 'schedule'
      run: |
        # Update README.md with latest status
        if [ -f "README.md" ]; then
          # Create status section if not exists
          if ! grep -q "## 📊 Provider Status" README.md; then
            cat >> README.md << 'EOF'

## 📊 Provider Status

<!-- STATUS_START -->
<!-- STATUS_END -->

EOF
          fi
          
          # Update status section
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          STATUS_CONTENT="<!-- STATUS_START -->
**Last Updated:** $TIMESTAMP

![Provider Health](https://img.shields.io/badge/Provider%20Health-${{ steps.health_check.outputs.health_percent }}%25-brightgreen)
![Working Providers](https://img.shields.io/badge/Working%20Providers-${{ steps.health_check.outputs.working_providers }}/4-blue)
![Working Domains](https://img.shields.io/badge/Working%20Domains-${{ steps.health_check.outputs.working_domains }}/${{ steps.health_check.outputs.total_domains }}-green)

### Quick Status:
- ✅ **Working Providers**: ${{ steps.health_check.outputs.working_providers }}/4
- 📊 **Domain Health**: ${{ steps.health_check.outputs.working_domains }}/${{ steps.health_check.outputs.total_domains }} (${{ steps.health_check.outputs.health_percent }}%)
- 🤖 **Auto-fixes Applied**: $(git log --oneline --grep="Auto-fix" | wc -l) total

### Recent Changes:
- $(git log -1 --pretty=format:"%s" | head -c 80)...

*Status updated automatically by GitHub Actions* 🤖
<!-- STATUS_END -->"
          
          # Replace status section
          awk '/<!-- STATUS_START -->/{p=1}/<!-- STATUS_END -->/{if(p)print "'"$STATUS_CONTENT"'"; p=0; next} !p' README.md > README.tmp && mv README.tmp README.md
        fi
    
    - name: 🚀 Commit and Push Changes
      if: steps.auto_fix.outputs.changes_made > 0
      run: |
        git add .
        git commit -m "📊 Auto-update: Provider status and health metrics

        Health: ${{ steps.health_check.outputs.health_percent }}%
        Working: ${{ steps.health_check.outputs.working_providers }}/4 providers
        Domains: ${{ steps.health_check.outputs.working_domains }}/${{ steps.health_check.outputs.total_domains }}

        [skip ci]" || echo "No changes to commit"
        git push origin main || git push origin master || echo "Push failed, but continuing..."
    
    - name: 📋 Create Issue for Failed Providers
      if: steps.health_check.outputs.failed_providers > 0
      uses: actions/github-script@v6
      with:
        script: |
          const healthPercent = ${{ steps.health_check.outputs.health_percent }};
          const failedProviders = ${{ steps.health_check.outputs.failed_providers }};
          const workingDomains = ${{ steps.health_check.outputs.working_domains }};
          const totalDomains = ${{ steps.health_check.outputs.total_domains }};
          
          // Check if issue already exists
          const issues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            labels: ['provider-health', 'auto-generated'],
            state: 'open'
          });
          
          const issueTitle = `🚨 Provider Health Alert - ${healthPercent}% Health`;
          const existingIssue = issues.data.find(issue => 
            issue.title.includes('Provider Health Alert')
          );
          
          const issueBody = `
          ## 📊 Provider Health Report
          
          **Current Health:** ${healthPercent}%
          **Failed Providers:** ${failedProviders}
          **Working Domains:** ${workingDomains}/${totalDomains}
          
          ### 🔍 Issues Detected:
          - ${failedProviders} provider(s) are completely down
          - ${totalDomains - workingDomains} domains are not responding
          - Overall health below optimal threshold (80%)
          
          ### 🤖 Automated Actions Taken:
          - Domain fix script executed
          - Health monitoring active
          - Status badges updated
          
          ### 📋 Manual Actions Needed:
          - [ ] Investigate failed providers
          - [ ] Check for new working domains
          - [ ] Update provider selectors if needed
          - [ ] Test video extraction manually
          
          ---
          *Auto-generated by Provider Health Monitor*
          *Last updated: ${new Date().toISOString()}*
          `;
          
          if (existingIssue) {
            // Update existing issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existingIssue.number,
              title: issueTitle,
              body: issueBody
            });
          } else if (healthPercent < 70) {
            // Create new issue only if health is critically low
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: issueBody,
              labels: ['provider-health', 'auto-generated', 'high-priority']
            });
          }
    
    - name: 📊 Upload Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: health-reports
        path: |
          health_report.txt
          fix_report.txt
          provider_status.json
          enhanced_analysis.json
          extractor_test.json
        retention-days: 30
    
    - name: 🔔 Slack Notification (Optional)
      if: env.SLACK_WEBHOOK_URL && (steps.health_check.outputs.health_percent < 70 || steps.auto_fix.outputs.changes_made > 0)
      run: |
        curl -X POST -H 'Content-type: application/json' \
        --data "{
          \"text\": \"🎬 Provider Health Update\",
          \"blocks\": [{
            \"type\": \"section\",
            \"text\": {
              \"type\": \"mrkdwn\",
              \"text\": \"*Provider Health:* ${{ steps.health_check.outputs.health_percent }}%\n*Working Providers:* ${{ steps.health_check.outputs.working_providers }}/4\n*Fixes Applied:* ${{ steps.auto_fix.outputs.changes_made }} files updated\"
            }
          }]
        }" ${{ env.SLACK_WEBHOOK_URL }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    
    - name: 📝 Summary
      run: |
        echo "## 🎬 Provider Health Check Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📊 Current Status:" >> $GITHUB_STEP_SUMMARY
        echo "- **Health Score:** ${{ steps.health_check.outputs.health_percent }}%" >> $GITHUB_STEP_SUMMARY
        echo "- **Working Providers:** ${{ steps.health_check.outputs.working_providers }}/4" >> $GITHUB_STEP_SUMMARY
        echo "- **Working Domains:** ${{ steps.health_check.outputs.working_domains }}/${{ steps.health_check.outputs.total_domains }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Auto-fixes Applied:** ${{ steps.auto_fix.outputs.changes_made }} changes" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🎯 Next Run:" >> $GITHUB_STEP_SUMMARY
        echo "This workflow runs automatically every 6 hours and on code changes." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "_Generated on $(date -u)_" >> $GITHUB_STEP_SUMMARY
